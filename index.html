<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kamera Takip</title>
    <meta name="theme-color" content="#111">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Segoe UI',Tahoma,sans-serif;background:#111;color:#fff;text-align:center;overflow-x:hidden;touch-action:manipulation;-webkit-user-select:none;user-select:none}
        .vc{position:relative;width:100%;background:#000;display:flex}
        video{width:100%;height:auto;max-height:78vh;display:block;object-fit:cover}
        canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:10;pointer-events:auto}
        #role{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px;background:linear-gradient(135deg,#1f1c2c,#928DAB)}
        .card{background:rgba(0,0,0,.45);padding:28px 20px;border-radius:16px;width:100%;max-width:400px;backdrop-filter:blur(10px)}
        .btn{padding:16px;font-size:17px;margin:8px 0;cursor:pointer;border-radius:12px;border:none;font-weight:700;width:100%;color:#fff;display:flex;align-items:center;justify-content:center;gap:8px}
        .btn:active{transform:scale(.97)}
        .btn-g{background:linear-gradient(45deg,#4CAF50,#2E7D32)}
        .btn-b{background:linear-gradient(45deg,#2196F3,#1565C0)}
        .btn-o{background:linear-gradient(45deg,#FF9800,#EF6C00);padding:12px;font-size:15px;max-width:220px;margin:8px auto}
        .ibox{background:rgba(255,255,255,.1);padding:14px;border-radius:10px;margin:12px 0;border:1px solid rgba(255,255,255,.15)}
        .code{font-size:30px;font-weight:800;letter-spacing:5px;color:#4CAF50;text-shadow:0 0 10px rgba(76,175,80,.5);margin:8px 0}
        .inp{width:100%;padding:14px;font-size:22px;text-align:center;font-weight:700;letter-spacing:5px;border-radius:10px;border:none;background:#fff;color:#333;margin-bottom:12px;inputmode:numeric}
        #alert{display:none;position:fixed;bottom:0;left:0;width:100vw;height:50vh;justify-content:center;align-items:center;flex-direction:column;background:rgba(255,0,0,0.85);color:#fff;font-size:20px;font-weight:900;text-align:center;animation:blink .5s infinite;z-index:9999;padding:10px;backdrop-filter:blur(5px)}
        #alert span{font-size:50px;display:block;margin-bottom:5px}
        @media (orientation:landscape){#alert{top:0;right:0;left:auto;bottom:auto;width:50vw;height:100vh} .vc{max-height:100vh; height:auto} video{max-height:100vh}}
        @keyframes blink{0%,100%{background:rgba(255,0,0,0.85)}50%{background:rgba(0,0,0,0.85)}}
        #bar{padding:8px 12px;background:#222;border-bottom:1px solid #444;font-size:12px;font-weight:700;color:#aaa;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px}
        .p{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:4px;animation:pf 1.5s infinite}
        .p{background:#f44336;box-shadow:0 0 6px #f44336}
        .p.g{background:#4CAF50;box-shadow:0 0 6px #4CAF50}
        @keyframes pf{0%,100%{opacity:1}50%{opacity:.4}}
        #main{display:none;height:100vh;flex-direction:column}
        .ctrl{background:#1e1e1e;padding:12px;border-bottom:1px solid #333;text-align:center}
        .lbar{width:100%;height:3px;background:#333;border-radius:2px;margin-top:6px;overflow:hidden}
        .lbar-f{height:100%;background:linear-gradient(90deg,#00bcd4,#4CAF50);transition:width .3s;animation:lp 1.5s infinite}
        @keyframes lp{0%,100%{opacity:1}50%{opacity:.5}}
        #vs{display:none;height:100vh;flex-direction:column;justify-content:center;align-items:center;padding:20px;background:#111}
    </style>
</head>
<body>
<div id="alert"><span>🚨</span>DİKKAT!<br>HEDEF KADRAJDAN ÇIKTI!</div>

<div id="role">
    <h1 style="font-size:26px;color:#fff;margin-bottom:8px">📱 Kamera Takip</h1>
    <p style="color:#bbb;font-size:12px;margin-bottom:22px">Kamera anında açılır. AI arka planda hazırlanır.</p>
    <div class="card">
        <button class="btn btn-g" id="btnCam">📸 KAMERA OL</button>
        <div style="height:1px;background:rgba(255,255,255,.2);margin:16px 0"></div>
        <button class="btn btn-b" id="btnView">👀 İZLEYİCİ OL</button>
    </div>
</div>

<div id="vs">
    <div class="card">
        <h2 style="font-size:17px;margin-bottom:16px">Kameraya Bağlan</h2>
        <p style="font-size:13px;color:#aaa;margin-bottom:12px">Kameradaki 5 haneli kodu girin:</p>
        <input type="text" id="jc" class="inp" placeholder="12345" maxlength="5" inputmode="numeric">
        <button class="btn btn-b" id="btnConn">Bağlan 🚀</button>
        <button class="btn" style="background:#444;margin-top:12px" onclick="location.reload()">Geri</button>
    </div>
</div>

<div id="main">
    <div id="bar">
        <div><span class="p" id="cp"></span><span id="cs">Bekleniyor...</span></div>
        <div id="as" style="color:#00bcd4">Hazırlanıyor...</div>
    </div>
    <div id="cc" class="ctrl" style="display:none">
        <div class="ibox" style="margin:0">
            <p style="font-size:11px;color:#aaa">İZLEYİCİ KODU:</p>
            <div class="code" id="mc">....</div>
            <p style="font-size:10px;color:#ff9800">Diğer telefonda İzleyici Ol'u seçip bu kodu girin.</p>
        </div>
    </div>
    <div id="lc" class="ctrl" style="display:none">
        <p style="font-size:13px;color:#fff;margin-bottom:6px">Kişiye <b style="color:#00bcd4">dokunun</b></p>
        <button id="ub" class="btn btn-o" style="display:none">Kilidi Sıfırla 🔓</button>
        <div id="ld" style="display:none">
            <p id="lt" style="font-size:11px;color:#aaa;margin-top:6px">AI yükleniyor...</p>
            <div class="lbar"><div class="lbar-f" id="lf" style="width:0%"></div></div>
        </div>
    </div>
    <div class="vc">
        <video id="vid" autoplay playsinline muted></video>
        <canvas id="cvs"></canvas>
    </div>
</div>

<script type="module" src="app.js?v=7"></script>
</body>
</html>
